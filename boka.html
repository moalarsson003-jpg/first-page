<!DOCTYPE html>
<html lang="sv">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Boka</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>

    <body>
        <header>
            <div class="header-container">
                <img src="images/6104776461_4c9af76020_q.webp" class="logo" alt="Hotellets logga">
                <img src="images/Hotel_pool_with_palms_at_night.webp" class="hotel" alt="Hotellet">
            </div>

            <div class="topnav" id="myTopnav">
                <a href="index.html">Startsida</a>
                <a href="hitta.html">Hitta</a>
                <a href="boka.html" class="active">Boka</a>
                <a href="kontakt.html">Kontakt</a>
                <button class="icon" onclick="myFunction()">
                    <i class="fa fa-bars"></i>
                </button>
            </div>
        </header>
        
        <main>
            <div class="container">
                <article>
                    <h2>Boka</h2>
                    <form action="https://httpbin.org/post" method="post">
                        <fieldset>
                           
                            <legend>Bokningsinformation</legend>
                            <label for="first-name">Förnamn:</label>
                            <input type="text" id="first-name" name="first-name" placeholder="Förnamn"><br>
                            <label for="last-name">Efternamn:</label>
                            <input type="text" id="last-name" name="last-name" placeholder="Efternamn"><br>
                            <label for="email">E-post:</label>
                            <input type="email" id="email" name="email" placeholder="din-epost@exempel.se"><br>
                            <label for="number">Telefonnummer:</label>
                            <input type="number" id="number" name="phone-number" placeholder="012 34 56 78"><br>
                            <label for="check-in">Incheckning:</label>
                            <input type="date" id="check-in" name="check-in"><br>
                            <label for="check-out">Utcheckning:</label>
                            <input type="date" id="check-out" name="check-out"><br>
                            <label for="room">Rumstyp:</label><select id="room">
                                <option value="single">Enkelrum</option>
                                <option value="double">Dubbelrum</option>
                                <option value="suite">Svit</option>
                                </select><br>
                                
                                <button type="submit">Skicka</button>

                        </fieldset>
                    </form>
                </article>
                
                <article>
                    <h2>Ett dubbelrum</h2>
                    <img src="images/54787796808_941fcb66ba_c.webp" alt="Ett dubbelrum">
                </article>
                
                </div>
        </main>

        <script>
            function myFunction() {
            var x = document.getElementById("myTopnav");
            if (x.className === "topnav") {
                x.className += " responsive";
            } else {
                x.className = "topnav";
            }
        }
        </script>

        <footer>
            <p>Hotell Royale | Storgatan 1 | 123 45 Storstad | 012 - 12 34 56</p>
        </footer>
    </body>


 </html>
